debug:
  enabled: true

# This tells cilium to only allow traffic that 
# has explicitly been allowed by a policy
policyEnforcementMode: "strict"

k8sServiceHost: 192.168.0.23
k8sServicePort: 6443

# Needs to be "strict" for cilium to work
kubeProxyReplacement: "strict"

loadBalancer: 
  l7:
    # Applicable values: round_robin, least_request, random
    algorithm: "round_robin"

# Make LoadBalancers accesible from local network
l2announcements:
  enabled: true
externalIPs:
  enabled: true

hubble:
  enabled: false
  tls:
    enabled: false
  ui:
    enabled: false
    rollOutPods: true
    service:
      type: LoadBalancer
      annotations:
        "io.cilium/lb-ipam-ips": "192.168.0.228"
  relay:
    enabled: false
    rollOutPods: true
    tls:
      server:
        enabled: false