apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - secrets.yaml
  - manager.yaml

images:
  - name: controller
    newName: 1password/onepassword-operator
    newTag: latest

helmCharts:
  - name: connect
    repo: https://1password.github.io/connect-helm-charts
    version: 1.16.0
    releaseName: "connect"
    includeCRDs: true
    namespace: onepassword
    valuesFile: values.yaml
