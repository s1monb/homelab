apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium-chart
  namespace: argocd
spec:
  project: default
  source:
    chart: cilium
    repoURL: https://helm.cilium.io/
    targetRevision: 1.19.0
    helm:
      releaseName: cilium
      values: |
        cgroup:
          autoMount:
            enabled: false
          hostRoot: /sys/fs/cgroup
        ipam:
          mode: kubernetes
        k8sServiceHost: localhost
        k8sServicePort: 7445
        kubeProxyReplacement: true

        securityContext:
          capabilities:
            ciliumAgent:
            - CHOWN
            - KILL
            - NET_ADMIN
            - NET_RAW
            - IPC_LOCK
            - SYS_ADMIN
            - SYS_RESOURCE
            - DAC_OVERRIDE
            - FOWNER
            - SETGID
            - SETUID
            cleanCiliumState:
            - NET_ADMIN
            - SYS_ADMIN
            - SYS_RESOURCE

        # Increase rate limit when doing L2 announcements
        k8sClientRateLimit:
          qps: 20
          burst: 100

        l2announcements:
          enabled: true

        externalIPs:
          enabled: true

        enableCiliumEndpointSlice: true

        loadBalancer:
          # https://docs.cilium.io/en/stable/network/kubernetes/kubeproxy-free/#maglev-consistent-hashing
          algorithm: maglev
  destination:
    server: "https://kubernetes.default.svc"
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true