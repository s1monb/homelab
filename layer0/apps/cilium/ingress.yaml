apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: valley-no
  namespace: valley-no
spec:
  rules:
    - host: valley.no
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: valley-no
                port:
                  number: 80
