apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: tandoor-secrets
  namespace: tandoor
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: tandoor-secrets
  data:
    - secretKey: SECRET_KEY
      remoteRef:
        key: tandoor
        property: SECRET_KEY
