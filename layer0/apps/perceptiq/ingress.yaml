apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: perceptiq
  namespace: perceptiq
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - perceptiq.no
      secretName: perceptiq-no-tls
  rules:
    - host: perceptiq.no
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: perceptiq
                port:
                  number: 80
