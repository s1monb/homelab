apiVersion: apps/v1
kind: Deployment
metadata:
  name: perceptiq
  namespace: perceptiq
  labels:
    app: perceptiq
spec:
  replicas: 2
  selector:
    matchLabels:
      app: perceptiq
  template:
    metadata:
      labels:
        app: perceptiq
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      volumes:
        - name: gcp-sa-key
          secret:
            secretName: gcp-nlp
      containers:
        - name: perceptiq
          image: ghcr.io/s1monb/perceptiq:0.1.1
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: perceptiq-db-app
                  key: uri
          envFrom:
            - secretRef:
                name: perceptiq-secrets
            - configMapRef:
                name: perceptiq
          volumeMounts:
            - name: gcp-sa-key
              mountPath: /etc/gcp
              readOnly: true
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
