apiVersion: apps/v1
kind: Deployment
metadata:
  name: perceptiq
  namespace: perceptiq
  labels:
    app: perceptiq
spec:
  replicas: 2
  selector:
    matchLabels:
      app: perceptiq
  template:
    metadata:
      labels:
        app: perceptiq
    spec:
      containers:
        - name: perceptiq
          image: ghcr.io/s1monb/perceptiq:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: perceptiq-db-app
                  key: uri
            - name: CLERK_ISSUER
              value: https://enhanced-raven-64.clerk.accounts.dev
            - name: CLERK_JWKS_URL
              value: https://enhanced-raven-64.clerk.accounts.dev/.well-known/jwks.json
          envFrom:
            - secretRef:
                name: perceptiq-secrets
            - configMapRef:
                name: perceptiq
          livenessProbe:
            httpGet:
              path: /api
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
