apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: github-argocd-token
  namespace: argocd
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: github-argocd-token
  data:
    - secretKey: token
      remoteRef:
        key: github-argocd
        property: token
